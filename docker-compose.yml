services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clientside-ecommerce-api
    init: true
    env_file:
      - .env.secret
    # REMOVED the 'environment: PORT' block to prevent overrides
    ports:
      - "4100:4100"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    # Remove the profile if you want Redis to always run in production
    container_name: clientside-ecommerce-redis
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data: