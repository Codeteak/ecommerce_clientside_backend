services:
  api:
    image: "${ECR_IMAGE_URI:?ECR_IMAGE_URI is required}"
    container_name: clientside-ecommerce-api
    init: true
    env_file:
      - ./.env
    ports:
      - "4100:4100"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4100/health"]
      interval: 30s
      timeout: 5s
      retries: 3