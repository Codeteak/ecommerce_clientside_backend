version: "3.9"

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: clientside-ecommerce-api

    init: true

    env_file:
      - .env

    environment:
      PORT: "4100"
      REDIS_URL: redis://redis:6379

    ports:
      - "4100:4100"

    depends_on:
      redis:
        condition: service_healthy

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4100/health"]
      interval: 30s
      timeout: 5s
      retries: 3

    deploy:
      resources:
        limits:
          memory: 512M


  redis:
    image: redis:7-alpine

    container_name: clientside-ecommerce-redis

    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

    restart: unless-stopped


volumes:
  redis_data: