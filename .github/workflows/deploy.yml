name: Deploy API

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare image name (lowercase)
        id: image_name
        run: echo "value=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}:latest
            ${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy container to EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}:${{ github.sha }}
          APP_DIR: /opt/clientside-ecommerce-api
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script_stop: true
          envs: IMAGE,APP_DIR,GHCR_USERNAME,GHCR_PAT
          script: |
            set -euo pipefail

            # 1. Navigate to the correct directory
            APP_DIR="/home/deploy/yaadro/ecommerce_clientside_backend"
            cd "${APP_DIR}"

            echo "Logging into GHCR..."
            echo "${GHCR_PAT}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

            echo "Fetching Secrets from AWS..."
            # This fetches the JSON and converts it to a clean .env format
            aws secretsmanager get-secret-value \
              --secret-id yaadro-ecom-prod-shop-api-runtime-env \
              --region ap-south-1 \
              --query SecretString \
              --output text | jq -r 'to_entries | .[] | "\(.key)=\(.value)"' > .env.secret

            echo "Adding Runtime Overrides..."
            {
              echo "NODE_ENV=production"
              echo "PORT=4100"
              echo "DATABASE_SSL_REJECT_UNAUTHORIZED=true"
              echo "TRUST_PROXY=true"
            } >> .env.secret

            echo "Updating Image..."
            docker pull "${IMAGE}"

            # Clean up the old container to avoid the "Name Conflict" error
            docker rm -f clientside-ecommerce-api || true

            echo "Deploying with Docker Compose..."
            # This starts BOTH the API and Redis correctly
            docker-compose down
            docker-compose up -d --force-recreate

            echo "Cleaning up..."
            docker image prune -f