name: Deploy API

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare image name (lowercase)
        id: image_name
        run: echo "value=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}:latest
            ${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy container to EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}:${{ github.sha }}
          # Path where your docker-compose.yml lives
          APP_DIR: /home/deploy/yaadro/ecommerce_clientside_backend
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          # Pass only the secrets NOT in AWS Secrets Manager via GitHub Secrets
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script_stop: true
          envs: IMAGE,APP_DIR,GHCR_USERNAME,GHCR_PAT,JWT_REFRESH_SECRET
          script: |
            set -euo pipefail

            cd "${APP_DIR}"

            echo "Logging into GHCR..."
            echo "${GHCR_PAT}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

            echo "Fetching dynamic secrets from AWS..."
            # Pull AWS JSON -> Convert to Key=Value -> Strip hidden Windows \r characters
            aws secretsmanager get-secret-value \
              --secret-id yaadro-ecom-prod-shop-api-runtime-env \
              --region ap-south-1 \
              --query SecretString \
              --output text | jq -r 'to_entries | .[] | "\(.key)=\(.value)"' | tr -d '\r' > .env

            echo "Appending missing mandatory production variables..."
            {
              echo "API_PUBLIC_URL=https://api.yaadro.online"
              echo "CORS_ORIGIN=https://yaadro.online"
              echo "JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-$(openssl rand -base64 32)}"
              echo "JWT_ALLOWED_ALGORITHMS=[\"HS256\"]"
              echo "GOOGLE_OAUTH_AUTH_URL=https://accounts.google.com/o/oauth2/v2/auth"
              echo "GOOGLE_OAUTH_TOKEN_URL=https://oauth2.googleapis.com/token"
              echo "GOOGLE_OAUTH_USERINFO_URL=https://www.googleapis.com/oauth2/v3/userinfo"
              echo "GOOGLE_OAUTH_SCOPE=openid email profile"
              echo "SERVICE_AREA_RADIUS_METERS=5000"
              echo "DATABASE_SSL_REJECT_UNAUTHORIZED=true"
              echo "NODE_ENV=production"
            } >> .env

            echo "Enforcing Port 4100 and final sanitization..."
            # Replace whatever port came from AWS with 4100
            sed -i 's/PORT=.*/PORT=4100/' .env
            # Final sweep for hidden characters/spaces
            sed -i 's/\r//g' .env
            sed -i 's/[[:space:]]*$//' .env

            echo "Updating Image..."
            docker pull "${IMAGE}"

            echo "Restarting Services with Docker Compose..."
            docker-compose down --remove-orphans
            docker-compose up -d --force-recreate

            echo "Deployment completed successfully!"