name: Deploy API

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare image name (lowercase)
        id: image_name
        run: echo "value=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}:latest
            ${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy container to EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}:${{ github.sha }}
          APP_DIR: /opt/clientside-ecommerce-api
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}

          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          API_PUBLIC_URL: ${{ secrets.API_PUBLIC_URL }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALLBACK_URL: ${{ secrets.GOOGLE_CALLBACK_URL }}

        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script_stop: true
          envs: IMAGE,APP_DIR,GHCR_USERNAME,GHCR_PAT,DATABASE_URL,JWT_SECRET,JWT_REFRESH_SECRET,API_PUBLIC_URL,CORS_ORIGIN,REDIS_URL,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,GOOGLE_CALLBACK_URL

          script: |
            set -euo pipefail

            echo "Starting deployment..."

            sudo mkdir -p "${APP_DIR}"
            sudo chown deploy:deploy "${APP_DIR}"

            cd "${APP_DIR}"

            echo "Logging into GHCR..."
            echo "${GHCR_PAT}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

            echo "Writing environment file..."
            cat > .env <<EOF
            NODE_ENV=production
            PORT=4100
            DATABASE_URL=${DATABASE_URL}
            JWT_SECRET=${JWT_SECRET}
            JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
            API_PUBLIC_URL=${API_PUBLIC_URL}
            CORS_ORIGIN=${CORS_ORIGIN}
            REDIS_URL=${REDIS_URL}
            GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
            GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
            GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
            EOF

            echo "Pulling latest image..."
            docker pull "${IMAGE}"

            echo "Stopping old container..."
            docker rm -f clientside-ecommerce-api || true

            echo "Starting new container..."
            docker run -d \
              --name clientside-ecommerce-api \
              --restart unless-stopped \
              --env-file .env \
              -p 4100:4100 \
              "${IMAGE}"

            echo "Cleaning unused images..."
            docker image prune -f

            echo "Deployment completed successfully!"