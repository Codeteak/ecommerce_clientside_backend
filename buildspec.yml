version: 0.2

env:
  variables:
    AWS_REGION: ap-south-1
    ECR_REPOSITORY_NAME: clientside-ecommerce-api
    DOCKER_BUILDKIT: "1"
    BUILDKIT_PROGRESS: plain
  exported-variables:
    - ACCOUNT_ID
    - ECR_URI
    - IMAGE_TAG

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "=== INSTALL $(date -u +%FT%TZ) build=${CODEBUILD_BUILD_ID} number=${CODEBUILD_BUILD_NUMBER} ==="
      - node --version && npm --version
      - docker --version

  pre_build:
    commands:
      - echo "=== PRE_BUILD $(date -u +%FT%TZ) ==="
      - chmod +x scripts/cicd/assert-codebuild-arm-host.sh scripts/cicd/docker-build-push.sh scripts/cicd/run-unit-tests.sh
      - bash scripts/cicd/assert-codebuild-arm-host.sh
      - . scripts/cicd/codebuild-env.sh
      - aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
      - npm ci --include=dev --loglevel=warn

  build:
    commands:
      - echo "=== BUILD $(date -u +%FT%TZ) ==="
      - bash scripts/cicd/run-unit-tests.sh -- --reporter=verbose
      - bash scripts/cicd/docker-build-push.sh

  post_build:
    commands:
      - echo "=== POST_BUILD $(date -u +%FT%TZ) ==="
      - printf '{"imageUri":"%s","imageTag":"%s","repository":"%s","builtAt":"%s"}\n' "${ECR_URI}:${IMAGE_TAG}" "${IMAGE_TAG}" "${ECR_URI}" "$(date -u +%FT%TZ)" > image-detail.json
      - cat image-detail.json

artifacts:
  files:
    - appspec.yml
    - docker-compose.yml
    - image-detail.json
    - scripts/**/*
  discard-paths: no
