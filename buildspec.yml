version: 0.2

# Logs: enable CloudWatch on the CodeBuild project (see scripts/cicd/setup_aws_cicd.sh).
# ECR_URI / IMAGE_TAG are set in pre_build and exported to later phases via exported-variables.

env:
  variables:
    AWS_REGION: ap-south-1
    ECR_REPOSITORY_NAME: clientside-ecommerce-api
    DOCKER_BUILDKIT: "1"
    BUILDKIT_PROGRESS: plain
  exported-variables:
    - ACCOUNT_ID
    - ECR_URI
    - IMAGE_TAG

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "=== INSTALL $(date -u +%FT%TZ) build=${CODEBUILD_BUILD_ID} number=${CODEBUILD_BUILD_NUMBER} ==="
      - node --version && npm --version
      - docker --version
  pre_build:
    commands:
      - echo "=== PRE_BUILD $(date -u +%FT%TZ) ==="
      - . scripts/cicd/codebuild-env.sh
      - echo "Installing dependencies..."
      - npm ci --include=dev --loglevel=info
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
      - echo "Preparing Docker Buildx..."
      - docker buildx create --name clientside-builder --use 2>/dev/null || docker buildx use clientside-builder
      - docker buildx inspect --bootstrap
  build:
    commands:
      - echo "=== BUILD $(date -u +%FT%TZ) ==="
      - echo "ECR_URI=${ECR_URI} IMAGE_TAG=${IMAGE_TAG}"
      - echo "Running unit tests..."
      - RUN_INTEGRATION_TESTS=0 NODE_ENV=test npm test -- --reporter=verbose
      - echo "Starting integration test services..."
      - docker compose -f docker-compose.test.yml up -d
      - chmod +x scripts/wait-for-test-services.sh
      - MAX_WAIT_SEC=180 INTEGRATION_COMPOSE_FILE=docker-compose.test.yml bash scripts/wait-for-test-services.sh
      - export DATABASE_URL=postgresql://postgres:test@127.0.0.1:5433/ecommerce_test
      - export INTEGRATION_DATABASE_URL=$DATABASE_URL
      - export INTEGRATION_REDIS_URL=redis://127.0.0.1:6380
      - export REDIS_URL=$INTEGRATION_REDIS_URL
      - npm run db:migrate
      - echo "Running integration tests..."
      - RUN_INTEGRATION_TESTS=1 NODE_ENV=test npm run test:integration:ci -- --reporter=verbose
      - docker compose -f docker-compose.test.yml down -v
      - echo "PWD=$(pwd) CODEBUILD_SRC_DIR=${CODEBUILD_SRC_DIR}"
      - ls -la "${CODEBUILD_SRC_DIR}"
      - docker version
      - docker buildx ls
      - echo "Building and pushing ARM64 image..."
      - . scripts/cicd/codebuild-env.sh
      - test -n "${ECR_URI}" && test -n "${IMAGE_TAG}"
      - test -f "${CODEBUILD_SRC_DIR}/Dockerfile"
      - bash scripts/cicd/docker-build-push.sh
      - |
        echo "Updating latest tag (best effort)..."
        docker buildx imagetools create -t "${ECR_URI}:latest" "${ECR_URI}:${IMAGE_TAG}" || \
        echo "Skipping latest tag update (likely ECR tag immutability)"
  post_build:
    commands:
      - echo "=== POST_BUILD $(date -u +%FT%TZ) ==="
      - echo "ECR_URI=${ECR_URI} IMAGE_TAG=${IMAGE_TAG}"
      - printf '{"imageUri":"%s","imageTag":"%s","repository":"%s","builtAt":"%s"}\n' "${ECR_URI}:${IMAGE_TAG}" "${IMAGE_TAG}" "${ECR_URI}" "$(date -u +%FT%TZ)" > image-detail.json
      - cat image-detail.json
      - echo "Build completed at $(date)"

artifacts:
  files:
    - appspec.yml
    - docker-compose.yml
    - image-detail.json
    - scripts/**/*
  discard-paths: no
